<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Work - Krupalu Creation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Calibri, Arial, sans-serif; background: #E8EDF3; color: #1E2A44; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 170px; min-width: 170px; flex-shrink: 0; background: #1E2A44; padding: 24px 12px; position: sticky; top: 0; left: 0; height: 100vh; overflow-y: auto; }
  body.sidebar-collapsed .sidebar { display: none; }
  #sidebarCollapseBtn { position:absolute; top:10px; right:8px; background:none; border:none; color:#8FA3C0; cursor:pointer; font-size:14px; }
  #sidebarReopenBtn { display:none; position:fixed; top:16px; left:16px; z-index:999; background:#1E2A44; color:#FFFFFF; border:none; border-radius:6px; width:34px; height:34px; cursor:pointer; font-size:15px; }
  body.sidebar-collapsed #sidebarReopenBtn { display:block; }
  body.sidebar-collapsed .main { padding-left: 64px; }
  body.sidebar-collapsed #calcBtnWrap { display: none; }
  body.sidebar-collapsed #calBtnWrap { display: none; }
  .sidebar h2 { color: #FFFFFF; font-size: 16px; margin-bottom: 20px; }
  .sidebar .logo-box { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
  .sidebar .logo-box img { width: 60px; height: 60px; margin-bottom: 10px; }
  .sidebar .logo-box p.tagline { font-size: 10.5px; color: #8FA3C0; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
  .sidebar a { display: block; padding: 10px 12px; margin-bottom: 4px; border-radius: 6px; color: #AEB9C9; text-decoration: none; font-size: 14px; }
  .sidebar a.active { background: #3B6EA5; color: #FFFFFF; }
  .main { flex: 1; padding: 24px 32px; }
  h1 { font-size: 22px; margin-bottom: 20px; }

  .form-card { background: #FFFFFF; border: 1px solid #D3DBE5; border-radius: 10px; padding: 24px; max-width: 750px; margin-bottom: 28px; }
  .field { margin-bottom: 14px; position: relative; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #5B6B7F; }
  .field input, .field select { width: 100%; padding: 9px 11px; border-radius: 6px; border: 1px solid #D3DBE5; font-size: 13.5px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .fabric-block { background: #F2F5F9; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .fabric-block .block-title { font-size: 12.5px; font-weight: 600; color: #5B6B7F; margin-bottom: 10px; }
  .fabric-grid1 { display: grid; grid-template-columns: 1.5fr 0.8fr 1fr; gap: 10px; margin-bottom: 10px; }
  .fabric-grid2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .add-fabric-btn { border: 1px dashed #8592A6; background: none; color: #5B6B7F; padding: 8px 14px; border-radius: 6px; font-size: 12.5px; cursor: pointer; margin-bottom: 16px; }
  .submit-btn { background: #1E2A44; color: #FFFFFF; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; cursor: pointer; }

  .suggest-box { position: absolute; background: #FFFFFF; border: 1px solid #D3DBE5; border-radius: 6px; width: 100%; z-index: 10; display: none; max-height: 180px; overflow-y: auto; }
  .suggest-box div { padding: 7px 10px; font-size: 12.5px; cursor: pointer; }
</style>
</head>
<body>
<div class="layout">
  <button id="sidebarReopenBtn" title="Show menu">☰</button>

  <div class="sidebar">
    <button id="sidebarCollapseBtn" title="Hide menu">⟨⟨</button>
    <div style="display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:8px; width:100%;">
      <img src="/static/swaminarayan_symbol.png" alt="" style="width:20px; height:26px; flex-shrink:0;">
      <span style="font-size:14px; color:#eda100; font-weight:600; text-align:center;">જય સ્વામિનારાયણ</span>
      <img src="/static/swaminarayan_symbol.png" alt="" style="width:20px; height:26px; flex-shrink:0;">
    </div>
    <div class="logo-box">
      <img src="/static/logo.png" alt="Krupalu Creation logo">
      <h2 style="margin:0;">Krupalu Creation</h2>
      <p class="tagline">Digital Printing</p>
    </div>
    <a href="/">Dashboard</a>
    <a href="/new-work" class="active">Orders</a>
    <a href="/deliveries">Deliveries</a>
    <a href="/payments">Payments</a>
    <a href="/parties">Parties</a>
    <a href="/balance-sheet">Balance sheet</a>
    <a href="/change-log">Change log</a>
    <a href="/reports">Reports</a>
  <div id="calBtnWrap" style="position:fixed; bottom:56px; left:12px; width:146px; z-index:500;">
      <button id="calToggleBtn" style="width:100%; height:34px; border-radius:6px; border:none; background:#2a3f5f; color:#AEB9C9; font-size:12px; cursor:pointer;">📅 Calendar</button>
    </div>
    <div id="calcBtnWrap" style="position:fixed; bottom:16px; left:12px; width:146px; z-index:500;">
      <button id="calcToggleBtn" style="width:100%; height:34px; border-radius:6px; border:none; background:#2a3f5f; color:#AEB9C9; font-size:12px; cursor:pointer;">🧮 Calculator</button>
    </div>

    <div id="calPanel" style="display:none; position:fixed; bottom:96px; left:12px; width:230px; background:#FFFFFF; border:1px solid #D3DBE5; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.2); z-index:1000; padding:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span id="calMonthLabel" style="font-size:13px; font-weight:600; color:#1E2A44;"></span>
        <span id="calCloseBtn" style="cursor:pointer; font-size:16px; color:#5B6B7F;">×</span>
      </div>
      <div id="calGrid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:3px; font-size:11px; text-align:center;"></div>
    </div>
  </div>

  <div id="calcPanel" style="display:none; position:fixed; top:100px; left:100px; width:230px; background:#FFFFFF; border:1px solid #D3DBE5; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.2); z-index:1000;">
    <div id="calcHeader" style="cursor:move; background:#1E2A44; color:#FFFFFF; padding:8px 12px; border-radius:10px 10px 0 0; display:flex; justify-content:space-between; align-items:center; font-size:13px;">
      <span>Calculator</span>
      <span id="calcCloseBtn" style="cursor:pointer; font-size:16px; line-height:1;">×</span>
    </div>
    <div style="padding:10px;">
      <input id="calcDisplay" readonly style="width:100%; padding:8px; margin-bottom:8px; font-size:16px; text-align:right; border:1px solid #D3DBE5; border-radius:6px;">
      <div id="calcButtons" style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px;"></div>
    </div>
  </div>

  <div class="main">
    <h1>New work entry</h1>

    <form class="form-card" method="POST" action="/new-work" id="orderForm">
      <div class="row2">
        <div class="field">
          <label>Company name</label>
          <input type="text" name="company_name" id="companyInput" autocomplete="off" required>
          <div id="companySuggestions" class="suggest-box"></div>
        </div>
        <div class="field">
          <label>Phone number</label>
          <input type="tel" name="phone" id="phoneInput" autocomplete="off" pattern="[0-9]{10}" maxlength="10" title="10 digit number daalo" required oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)">
        </div>
        <div class="field">
          <label>Inward challan number</label>
          <input type="text" name="challan_number" autocomplete="off" required>
        </div>
        <div class="field">
          <label>Date received</label>
          <input type="date" name="date_received" required>
        </div>
      </div>

      <div id="fabricRows"></div>

      <button type="button" class="add-fabric-btn" id="addFabricBtn">+ Add fabric</button>
      <br>
      <button type="submit" class="submit-btn">Save order</button>
    </form>
  </div>

</div>

<script>
const GARMENT_TYPES = [{% for gt in garment_types %}{ id: {{ gt.id }}, name: "{{ gt.name }}" }{% if not loop.last %},{% endif %}{% endfor %}];
const FABRIC_WIDTHS = [{% for w in fabric_widths %}{{ w }}{% if not loop.last %},{% endif %}{% endfor %}];

let rowCount = 0;

function makeFabricRow() {
  rowCount++;
  const div = document.createElement("div");
  div.className = "fabric-block";

  const garmentOptions = GARMENT_TYPES.map(g => `<option value="${g.id}">${g.name}</option>`).join("");
  const widthOptions = FABRIC_WIDTHS.map(w => `<option value="${w}">${w}"</option>`).join("");

  div.innerHTML = `
    <p class="block-title">Fabric ${rowCount}</p>
    <div class="fabric-grid1">
      <div class="field" style="margin-bottom:0;">
        <label>Fabric name</label>
        <input type="text" name="fabric_name" class="fabric-name-input" autocomplete="off" required>
        <div class="suggest-box fabric-suggest"></div>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Width</label>
        <select name="fabric_width_inches">
          <option value="">--</option>
          ${widthOptions}
        </select>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Garment type</label>
        <select name="garment_type_id">
          <option value="">-- None --</option>
          ${garmentOptions}
        </select>
      </div>
    </div>
    <div class="fabric-grid2">
      <div class="field" style="margin-bottom:0;">
        <label>Total takka</label>
        <input type="number" name="total_takka" placeholder="e.g. 8">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Meters given</label>
        <input type="number" step="0.1" name="meters_given" required>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Rate (optional)</label>
        <input type="number" step="0.1" name="rate_per_meter" placeholder="Rs/m">
      </div>
    </div>
  `;

  document.getElementById("fabricRows").appendChild(div);

  const fabricInput = div.querySelector(".fabric-name-input");
  const fabricBox = div.querySelector(".fabric-suggest");
  setupAutocomplete(fabricInput, fabricBox, "/api/search-fabrics");
}

function setupAutocomplete(input, box, apiUrl) {
  let activeIndex = -1;

  input.addEventListener("input", async () => {
    const query = input.value.trim();
    activeIndex = -1;
    if (query.length < 1) { box.style.display = "none"; return; }

    const res = await fetch(`${apiUrl}?q=${encodeURIComponent(query)}`);
    const data = await res.json();

    if (data.matches.length === 0) { box.style.display = "none"; return; }

    box.innerHTML = "";
    data.matches.forEach((match, i) => {
      const item = document.createElement("div");
      item.textContent = match;
      item.addEventListener("mouseenter", () => highlight(i));
      item.addEventListener("mousedown", (e) => { e.preventDefault(); pick(match); });
      box.appendChild(item);
    });
    box.style.display = "block";

    function highlight(i) {
      activeIndex = i;
      box.querySelectorAll("div").forEach((el, idx) => {
        el.style.background = idx === i ? "#F2F5F9" : "#FFFFFF";
      });
    }

    input.onkeydown = (e) => {
      const items = box.querySelectorAll("div");
      if (items.length === 0) return;
      if (e.key === "ArrowDown") { e.preventDefault(); activeIndex = Math.min(activeIndex + 1, items.length - 1); highlight(activeIndex); }
      else if (e.key === "ArrowUp") { e.preventDefault(); activeIndex = Math.max(activeIndex - 1, 0); highlight(activeIndex); }
      else if (e.key === "Enter" && activeIndex >= 0) { e.preventDefault(); pick(items[activeIndex].textContent); }
    };

    function pick(val) {
      input.value = val;
      box.style.display = "none";
    }
  });

  input.addEventListener("blur", () => setTimeout(() => box.style.display = "none", 150));
}

document.getElementById("addFabricBtn").addEventListener("click", makeFabricRow);
makeFabricRow();

const companyInput = document.getElementById("companyInput");
const companyBox = document.getElementById("companySuggestions");
const phoneInput = document.getElementById("phoneInput");
setupAutocomplete(companyInput, companyBox, "/api/search-companies");

companyInput.addEventListener("blur", async () => {
  const name = companyInput.value.trim();
  if (!name) return;
  const res = await fetch(`/api/company-phone?name=${encodeURIComponent(name)}`);
  const data = await res.json();
  if (data.phone) phoneInput.value = data.phone;
});
</script>
<script>
(function(){
  if (localStorage.getItem('sidebarCollapsed') === 'true') {
    document.body.classList.add('sidebar-collapsed');
  }
  var cBtn = document.getElementById('sidebarCollapseBtn');
  var rBtn = document.getElementById('sidebarReopenBtn');
  if (cBtn) cBtn.addEventListener('click', function(){
    document.body.classList.add('sidebar-collapsed');
    localStorage.setItem('sidebarCollapsed', 'true');
  });
  if (rBtn) rBtn.addEventListener('click', function(){
    document.body.classList.remove('sidebar-collapsed');
    localStorage.setItem('sidebarCollapsed', 'false');
  });
})();
</script>
<script>
(function(){
  const toggleBtn = document.getElementById('calcToggleBtn');
  const panel = document.getElementById('calcPanel');
  const closeBtn = document.getElementById('calcCloseBtn');
  const header = document.getElementById('calcHeader');
  const display = document.getElementById('calcDisplay');
  const buttonsBox = document.getElementById('calcButtons');

  const keys = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+','C'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.textContent = k;
    btn.style.cssText = 'padding:10px 0; border:1px solid #D3DBE5; border-radius:6px; background:#F2F5F9; font-size:14px; cursor:pointer;';
    if (k === '=') { btn.style.gridColumn = 'span 2'; btn.style.background = '#1E2A44'; btn.style.color = '#FFFFFF'; }
    if (k === 'C') { btn.style.background = '#A23B3B'; btn.style.color = '#FFFFFF'; }
    btn.addEventListener('click', () => {
      if (k === 'C') { display.value = ''; return; }
      if (k === '=') {
        try {
          const clean = display.value.replace(/[^0-9+\-*/.]/g, '');
          display.value = Function('"use strict"; return (' + clean + ')')();
        } catch (e) { display.value = 'Error'; }
        return;
      }
      display.value += k;
    });
    buttonsBox.appendChild(btn);
  });

  toggleBtn.addEventListener('click', () => {
    panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
  });
  closeBtn.addEventListener('click', () => { panel.style.display = 'none'; });

  let isDragging = false, offsetX = 0, offsetY = 0;
  header.addEventListener('mousedown', (e) => {
    isDragging = true;
    offsetX = e.clientX - panel.offsetLeft;
    offsetY = e.clientY - panel.offsetTop;
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panel.style.left = (e.clientX - offsetX) + 'px';
    panel.style.top = (e.clientY - offsetY) + 'px';
  });
  document.addEventListener('mouseup', () => { isDragging = false; });

  const calToggleBtn = document.getElementById('calToggleBtn');
  const calPanel = document.getElementById('calPanel');
  const calCloseBtn = document.getElementById('calCloseBtn');
  const calMonthLabel = document.getElementById('calMonthLabel');
  const calGrid = document.getElementById('calGrid');

  function renderCalendar() {
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    calMonthLabel.textContent = monthNames[month] + ' ' + year;

    calGrid.innerHTML = '';
    ['S','M','T','W','T','F','S'].forEach(d => {
      const cell = document.createElement('div');
      cell.textContent = d;
      cell.style.cssText = 'font-weight:600; color:#8592A6; padding:4px 0;';
      calGrid.appendChild(cell);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      calGrid.appendChild(document.createElement('div'));
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.textContent = d;
      cell.style.cssText = 'padding:5px 0; border-radius:4px;';
      if (d === today.getDate()) {
        cell.style.background = '#1E2A44';
        cell.style.color = '#FFFFFF';
        cell.style.fontWeight = '600';
      }
      calGrid.appendChild(cell);
    }
  }
  renderCalendar();

  calToggleBtn.addEventListener('click', () => {
    calPanel.style.display = (calPanel.style.display === 'none') ? 'block' : 'none';
  });
  calCloseBtn.addEventListener('click', () => { calPanel.style.display = 'none'; });

  document.addEventListener('keydown', (e) => {
    if (panel.style.display !== 'block') return;
    if (e.key >= '0' && e.key <= '9') { display.value += e.key; }
    else if (['+','-','*','/','.'].includes(e.key)) { display.value += e.key; }
    else if (e.key === 'Enter') {
      e.preventDefault();
      try {
        const clean = display.value.replace(/[^0-9+\-*/.]/g, '');
        display.value = Function('"use strict"; return (' + clean + ')')();
      } catch (err) { display.value = 'Error'; }
    }
    else if (e.key === 'Backspace') { display.value = display.value.slice(0, -1); }
    else if (e.key === 'Escape') { panel.style.display = 'none'; }
  });
})();
</script>
</body>
</html>
